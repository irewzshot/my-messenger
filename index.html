<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейный Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://meet.jit.si/external_api.js'></script>
    <style>
        /* Анимация появления уведомления */
        #call-toast {
            display: none;
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 200;
            border: 1px solid #517da2;
        }
        body { background-color: #f0f2f5; }
        /* Фон как в TG */
        .chat-area { 
            background-color: #8daaf5; 
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            background-attachment: fixed;
        }
        /* Облачка сообщений */
        .msg-bubble {
            max-width: 80%; /* Чтобы не на весь экран */
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }
        .msg-in { border-radius: 15px 15px 15px 5px; background: white; }
        .msg-out { border-radius: 15px 15px 5px 15px; background: #effdde; }
        
        #video-coll-container { display: none; position: fixed; inset: 0; z-index: 100; background: black; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    
    <div id="call-toast" class="flex items-center space-x-4">
        <span id="call-text" class="text-sm font-medium text-gray-800"></span>
        <div class="flex space-x-2">
            <button onclick="acceptCall()" class="bg-green-500 text-white px-3 py-1 rounded-lg text-xs">Зайти</button>
            <button onclick="closeToast()" class="bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-xs">Позже</button>
        </div>
    </div>

    <div id="video-coll-container">
        <div id="jitsi-container" class="h-full w-full"></div>
        <button onclick="closeVideo()" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full font-bold z-[101] shadow-2xl">
            Завершить звонок
        </button>
    </div>

    <header class="bg-[#517da2] text-white p-3 shadow-lg flex items-center justify-between z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">🏠</div>
            <div>
                <h1 class="font-bold text-sm sm:text-base leading-tight">Наша Семья</h1>
                <p id="my-name" class="text-[10px] opacity-80 uppercase tracking-wider"></p>
            </div>
        </div>
        <button onclick="startVideo()" class="bg-green-500 p-2.5 rounded-full hover:bg-green-600 transition active:scale-95 shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        </button>
    </header>

    <main id="chat" class="flex-1 overflow-y-auto p-4 space-y-4 chat-area flex flex-col">
        </main>

    <footer class="p-3 bg-white flex items-center space-x-2 border-t">
        <input id="input" type="text" placeholder="Сообщение" 
               class="flex-1 p-2.5 bg-gray-100 rounded-full outline-none px-5 border focus:border-blue-400 transition-all text-sm">
        <button onclick="send()" class="bg-[#248bf2] text-white p-2.5 rounded-full hover:bg-blue-600 transition active:scale-90">
            <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current rotate-90"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </footer>

    <script>
        const user = localStorage.getItem('family_user') || prompt("Ваше имя:") || "Гость";
        localStorage.setItem('family_user', user);
        document.getElementById('my-name').innerText = user;

        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${location.host}/ws/${user}`);

        let jitsiApi = null;

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'history') {
                chat.innerHTML = '';
                data.data.forEach(m => addMsg(m));
            }
            if (data.type === 'msg') addMsg(data);
            if (data.type === 'call_notify') {
                if(confirm(data.sender + " начал видеозвонок. Зайти?")) startVideo();
            }
        };

        function addMsg(m) {
            const isMe = m.sender === user;
            const div = document.createElement('div');
            div.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'}`;
            
            div.innerHTML = `
                <div class="msg-bubble p-3 ${isMe ? 'msg-out' : 'msg-in'}">
                    ${!isMe ? `<div class="text-[10px] font-bold text-blue-500 mb-0.5">${m.sender}</div>` : ''}
                    <div class="text-[14px] text-gray-800 leading-snug">${m.text}</div>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function send() {
            const text = input.value.trim();
            if (!text) return;
            ws.send(JSON.stringify({ type: 'msg', text: text }));
            input.value = '';
        }

        function startVideo() {
            document.getElementById('video-coll-container').style.display = 'block';
            const options = {
                roomName: "FamilySecretRoom_ChangeThis", 
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: user }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
            ws.send(JSON.stringify({ type: 'call_start' }));
        }

        function closeVideo() {
            if(jitsiApi) jitsiApi.dispose();
            document.getElementById('video-coll-container').style.display = 'none';
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
